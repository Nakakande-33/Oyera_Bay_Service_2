<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyera Bay Service_Technician Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div id="tech-container">
    <h1>Technician Registration</h1><br>
    <h4>Are you a technician or mechanic?</h4><br
    <p>
        <a href="home.html" target="_blank">Back to Home</a></p>
        <br></p>
        <a href="customer_registration.html" target="_blank">Register as Customer!!!</a><br>
        <p><br>
    </p>
    
    <div class="technician-registration">
        <h2>Register as a Technician</h2>
        <form action="submit_technician_registration.html" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required><br><br>

            <label for="experience">Years of Experience:</label>
            <input type="number" id="experience" name="experience" min="0" required><br><br>

            <label for="specialization">Specialization:</label>
            <select id="specialization" name="specialization">
                <option value="">Select Specialization</option>
                <option value="engine-repair">Engine Repair</option>
                <option value="bodywork">Bodywork</option>
                <option value="electrical">Electrical</option>
                <option value="mechanical">Mechanical</option>
            </select><br><br>

            <input type="submit" value="Register">
        </form>
    </div>
</div>
</body>
</html>
