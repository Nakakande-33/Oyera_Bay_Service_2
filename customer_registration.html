<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAS Bay - Customer Registration</title>
  <link rel="stylesheet" href="customer_registration.css">

</head>

<body>

  <header>
    <h1>Oyera Auto Service Bay</h1>
    <p>Customer Registration & Vehicle Intake Portal</p>
  </header>

  <div class="container">
    <div class="sidenavbar">
      <li>
        <a href="dashboard.html">Dashboard</a>
      </li>
      <li>
        <a href="home.html">Home Page</a>
      </li>
      <li>
        <a href="Technician_stafflogin.html">Technician Registration</a>
      </li>
    </div>
    <div class="form-card">
      <h2>Register as New Customer</h2>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="e.g., John Mukasa" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g., 0772000000" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address (Optional)</label>
          <input type="email" id="email" name="email" placeholder="e.g., john@example.com">
        </div>

        <div class="form-group">
          <label for="Password">Password</label>
          <input type="password" id="Password" name="Password">
        </div>

        <div class="form-group">
          <label for="Password">Re-enter Password</label>
          <input type="password" id="ConfirmedPassword" name="Password">
        </div>

        <div class="form-group">
          <label for="plateNumber">Vehicle Number Plate</label>
          <input type="text" id="plateNumber" name="plateNumber" placeholder="e.g., UBL 442J" required>
        </div>

        <div class="form-group">
          <label for="vehicleType">Vehicle Category</label>
          <select id="vehicleType" name="vehicleType" required>
            <option value="">-- Select Type --</option>
            <option value="small">Small Car</option>
            <option value="commercial">Commercial Vehicle</option>
            <option value="heavy">Heavy Car / Truck</option>
          </select>
        </div>

        <div class="form-group">
          <label for="vehicleType">Service Required </label>
          <select id="servicerequired" name="servicetype" required>
            <option value="">-- Select Type --</option>
            <option value="small">Wheel alignment</option>
            <option value="commercial"> Balance</option>
            <option value="heavy">Gearbox oil Change</option>
            <option value="heavy">Oil filter Greasing</option>
            <option value="heavy">Brake fluid Drainage and Refill</option>
          </select>
        </div>

        <button type="submit" class="btn-submit">Register Customer & Open Record</button>
      </form>

      <div class="nav-links">
        <a href="dashboard.html">&larr; Return to Service Queue</a>
      </div>
    </div>
  </div>
  <br>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>


  <footer>
    Oyera Auto Service Bay Ltd &copy; 2026
  </footer>

</body>

</html>
